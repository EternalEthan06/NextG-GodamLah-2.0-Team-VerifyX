<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Verification | SLP-ID</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; /* Deep Navy */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .security-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .official-badge {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 25px; opacity: 0.7; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 15px; margin-bottom: 30px; }

        /* --- CHALLENGE PHRASE BOX --- */
        .challenge-box {
            background: #1e293b;
            border: 1px dashed #334155;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .challenge-label { font-size: 12px; color: #64748b; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .challenge-text { font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 0.5px; }

        /* --- AUDIO VISUALIZER --- */
        .mic-wrapper {
            width: 80px; height: 80px;
            background: #1e293b;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #fff;
            position: relative;
            transition: all 0.3s;
        }

        /* The Pulse Animation (Hidden by default) */
        .mic-pulse {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid #0ea5e9;
            opacity: 0;
        }

        .recording .mic-wrapper { background: #ef4444; color: white; transform: scale(1.1); }
        .recording .mic-pulse { animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* --- BUTTONS --- */
        .btn-record {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px; font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            display: inline-flex; align-items: center; gap: 10px;
        }
        
        .btn-record:hover { background: #0284c7; }
        .btn-record:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }

        .status-msg { margin-top: 25px; min-height: 20px; font-size: 14px; color: #0ea5e9; }

    </style>
</head>
<body>

    <div class="security-container">
        <div class="official-badge">
            <img src="https://flagcdn.com/w40/my.png" alt="Malaysia" style="width: 20px; border-radius: 2px;">
            Voice Liveness Check
        </div>

        <h1>Verify Your Voice</h1>
        <p>Please read the phrase below loudly and clearly to confirm your identity.</p>

        <div class="challenge-box">
            <div class="challenge-label">Read this phrase:</div>
            <div class="challenge-text" id="randomPhrase">"Loading..."</div>
        </div>

        <div class="mic-container" id="micContainer">
            <div class="mic-wrapper">
                <i class="fas fa-microphone"></i>
                <div class="mic-pulse"></div>
            </div>
        </div>

        <button class="btn-record" id="recordBtn" onclick="startVoiceScan()">
            <i class="fas fa-microphone"></i> Start Recording
        </button>

        <div class="status-msg" id="statusMsg"></div>
    </div>

    <script>
        // 1. List of Random Phrases
        const phrases = [
            "Kuala Lumpur is the capital city of Malaysia.",
            "The Petronas Twin Towers are very tall and impressive.",
            "Nasi lemak is a popular Malaysian dish.",
            "Mount Kinabalu is located in Sabah.",
            "The Penang Bridge connects Penang Island to the mainland.",
            "Durian is known as the king of fruits in Malaysia.",
            "Malacca has many historical buildings from the colonial era.",
            "The Malaysian flag has fourteen stripes and a crescent.",
            "Orangutans can be found in Sarawak and Sabah.",
            "The rainforest in Taman Negara is very dense and green.",
            "The Sultan Abdul Samad Building is in Kuala Lumpur.",
            "Rafflesia is the world’s largest flower and grows in Malaysia.",
            "The Langkawi Sky Bridge offers a breathtaking view.",
            "Malaysian Borneo has diverse wildlife and natural beauty.",
            "Traditional batik is a famous Malaysian art form."
        ];



        // 2. Function to pick a random phrase on load
        window.onload = function() {
            const randomIndex = Math.floor(Math.random() * phrases.length);
            document.getElementById('randomPhrase').innerText = `"${phrases[randomIndex]}"`;
        };

        function startVoiceScan() {
            const btn = document.getElementById('recordBtn');
            const container = document.getElementById('micContainer');
            const status = document.getElementById('statusMsg');
            
            // 3. UI: Start Recording Mode
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-stop"></i> Recording...';
            container.classList.add('recording'); // Starts the pulse animation
            status.innerText = "Listening...";
            
            // 4. Simulate Recording (3 seconds)
            setTimeout(() => {
                // Stop Recording
                container.classList.remove('recording');
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
                status.innerText = "Analyzing Voice Print & Liveness...";

                // 5. Simulate Analysis (2 seconds)
                setTimeout(() => {
                    status.innerText = "Voice Match Confirmed (99.8%). Redirecting...";
                    status.style.color = "#10b981"; // Green
                    
                    // 6. Redirect
                    setTimeout(() => {
                        window.location.href = "/step-complete";
                    }, 1000);
                }, 2000);

            }, 3000);
        }
    </script>
</body>
</html>
